<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Menu</title>
    <style>
        /*desktop view*/
        .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: auto;
            font-family: Arial, Helvetica, sans-serif;
            padding: 0 20px;
            font-size: 14px;
        }

        .Services {
            color: rgba(249, 97, 43);
        }

        .logo {
            height: auto;
            width: 15%;
        }

        .menu {
            flex-direction: row;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        .services {
            color: rgba(249, 97, 43);
        }

        .menu2 {
            flex-direction: row;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .phonelogo {
            width: 13%;
        }

        .number {
            font-weight: bold;
        }

        .ButtonContact {
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            background-color: rgba(249, 97, 43);
            border-color: rgba(249, 97, 43);
            border-radius: 10px;
            text-align: center;
            align-items: center;
            width: 80px;
            height: 40px;
        }

        img.hamburger {
            display: none;
        }

        /*tablet view*/
        @media screen and (max-width: 1024px) {

            .menu {
                display: none;
            }

            .logo {
                height: auto;
                width: 20%;
            }

            .phonelogo {
                width: 20%;
            }

            .menu2 {
                display: flex;
                margin-left: auto;
                gap: 10px;
            }

            .ButtonContact {
                display: none;
            }

            img.hamburger {
                display: block;
                width: 30px;
            }
        }

        /*mobile view*/
        @media screen and (max-width: 766px) {

            .menu {
                display: none;
            }

            .logo {
                height: auto;
                width: 25%;
            }

            .menu2 {
                display: none;
            }

        }
    </style>

</head>

<body>
    <div class="container">
        <img class="logo" src="images/Screenshot 2026-06-30 105134.png" alt="logo">
        <div class="menu">
            <div class="Home">Home</div>
            <div class="Services">Services</div>
            <div class="Work">Work</div>
            <div class="ProjectDetails">Project Details</div>
            <div class="MenuContact">Contact</div>
        </div>
        <div class="menu2">
            <img class="phonelogo" src="images/phone.png" alt="phonelogo">
            <div class="number">555-123-4567</div>
            <div><button class="ButtonContact">Contact</button></div>
        </div>
        <img class="hamburger" src="images/hamburger.png" alt="hamburger">
    </div>

</body>

</html>
