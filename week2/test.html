<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background-color: rgb(246, 178, 77);
        }

        h1 {
            color: blue;
            font-family: Arial, sans-serif;
            text-align: center;
            text-decoration: underline;
            font-size: 56px;
        }

        h1.noundunderline {
            color: rgb(255, 71, 71);
            text-decoration: none;
            text-align: right;
            font-size: 36px;
        }

        p {
            color: rgb(255, 255, 255);
            background-color: rgb(68, 177, 255);
            border: 2px solid black;
            border-radius: 20px;
            padding: 20px;
            margin: 60px;
            font-family: Georgia, 'Times New Roman', Times, serif;
        }

        img {
            margin: auto;
            /* center the image horizontally */
            display: block;
            /* Making the image to non sharing spacing */
        }
    </style>

</head>


<body>
    <h1>Christine</h1>
    <h1 class="noundunderline">Gachi Buchu!</h1>
    <h1 class="noundunderline">AwA</h1>
    <img src="images/instagram (1).png" width="30" alt="Instagram"><br>
    <img src="images/1000_0919_0041_web.jpg" width="300" alt="Bullet Train"><br>
    <p>Bullet Train is an Japanese music and dance group. They are known for their energetic performances and unique
        choreography. They also perform at various events and concerts. There are 9 members in the group.<br>
    </p>

</html>
