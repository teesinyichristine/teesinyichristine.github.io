<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flexbox2</title>
    <link rel="stylesheet" href="css/flexbox2.css">
</head>

<body>
    <div class="container">
        <div class="logo">
            <img class="logo" src="images/Icon.png" width="100" alt="logo">
            <h2>Positivus</h2>
        </div>
        <div class="menu">
            <div>About us</div>
            <div>Services</div>
            <div>Use cases</div>
            <div>Pricing</div>
            <div>Blog</div>
            <div><button class="Requestaquote">Request a quote</button></div>
        </div>
    </div>

    <div class="slogan">
        <div class="box1">
            <h1>Navigating the digital landscape for success</h1>
            <p>Our digital marketing agency helps businesses grow and succeed online through a range of
                services
                including
                SEO,
                PPC, social media marketing, and content creation.</p>
            <button class="Bookaconsultation">Book a consultation</button>
        </div>
        <div class="box2">
            <img class="illustration" src="images/Illustration.png" alt="Illustration">
        </div>
    </div>

    <div class="company">
        <img src="images/amazon.png" alt="amazon">
        <img src="images/dribbble.png" alt="dribbble">
        <img src="images/hubspot.png" alt="hubspot">
        <img src="images/notion.png" alt="notion">
        <img src="images/netflix.png" alt="netflix">
        <img src="images/zoom.png" alt="zoom">
    </div>

</body>

</html>
