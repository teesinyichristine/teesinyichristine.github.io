<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>test</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        #main {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        #main div {
            background-color: bisque;
            width: calc(100% / 4 - calc(30px / 4));
            height: 50px;
            border: 1px solid black;
            padding: 10px;
        }

        @media (max-width:800px) {
            #main div {
                width: calc(100% / 2 - 7.5px);
            }
        }
    </style>
</head>
